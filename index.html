<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NyashMaps — MapTiler 3D MVP</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@^4.0.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@^4.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .ui-panel { transition: transform 0.3s ease-in-out, opacity 0.3s ease-in-out; }
        .hidden-panel { transform: translateX(120%); opacity: 0; }
        @media (max-width: 640px) {
            .hidden-panel { transform: translateY(120%); opacity: 0; }
        }
    </style>
</head>
<body class="bg-gray-900 font-sans text-gray-800">

    <div id="map"></div>

    <!-- Панель управления -->
    <div class="absolute top-5 left-1/2 transform -translate-x-1/2 bg-white/90 backdrop-blur-md px-4 py-2 rounded-full shadow-2xl flex items-center space-x-2 z-10 text-xs sm:text-sm font-semibold border border-white/20 max-w-[95%] overflow-x-auto whitespace-nowrap">
        <span class="text-indigo-600 font-bold tracking-wider mr-1 hidden sm:inline">NyashMaps</span>
        <button id="btn-2d" class="px-3 py-1.5 rounded-full bg-indigo-600 text-white shadow-sm transition">2D Схема</button>
        <button id="btn-3d" class="px-3 py-1.5 rounded-full hover:bg-gray-200/70 transition">3D Город</button>
        <button id="btn-sat" class="px-3 py-1.5 rounded-full hover:bg-gray-200/70 transition">Спутник</button>
        <div class="w-px h-5 bg-gray-300"></div>
        <button id="btn-time" class="px-3 py-1.5 rounded-full hover:bg-gray-800 hover:text-white transition text-indigo-600 flex items-center gap-1">
            <span>🌙</span> Ночь
        </button>
    </div>

    <!-- Боковая Информационная Панель -->
    <div id="info-panel" class="ui-panel hidden-panel absolute bottom-5 sm:bottom-auto sm:top-5 right-5 left-5 sm:left-auto sm:w-80 bg-white/95 backdrop-blur-xl rounded-2xl shadow-2xl z-10 overflow-hidden border border-gray-100 flex flex-col max-h-[40vh] sm:max-h-none">
        <div class="h-32 sm:h-44 bg-cover bg-center relative" style="background-image: url('https://images.unsplash.com/photo-1519501025264-65ba15a82390?q=80&w=600&auto=format&fit=crop');">
            <button id="close-panel" class="absolute top-3 right-3 bg-black/40 backdrop-blur-sm text-white rounded-full w-8 h-8 flex items-center justify-center hover:bg-black/60 transition font-bold">✕</button>
        </div>
        <div class="p-4 sm:p-5 flex-1 flex flex-col justify-between">
            <div>
                <h2 id="location-title" class="text-lg sm:text-xl font-bold text-gray-900 mb-1 tracking-tight">Координаты</h2>
                <p class="text-[10px] text-gray-400 mb-3 font-medium uppercase tracking-wider">Инфо-капсула места</p>
                <div class="flex flex-wrap gap-1.5 mb-3">
                    <span class="px-2 py-0.5 bg-green-50 text-green-700 text-[10px] font-bold rounded-md border border-green-200/50">Открыто</span>
                    <span class="px-2 py-0.5 bg-indigo-50 text-indigo-700 text-[10px] font-bold rounded-md border border-indigo-200/50">#Вайб</span>
                </div>
                <p class="text-xs sm:text-sm text-gray-600 leading-relaxed bg-gray-50 p-3 rounded-xl border border-gray-100">
                    Здесь будут ваши Капсулы Времени.
                </p>
            </div>
            <button class="w-full mt-4 bg-indigo-600 text-white py-2.5 rounded-xl font-bold shadow-lg shadow-indigo-600/20 hover:bg-indigo-700 transition text-xs sm:text-sm">
                ▶ Послушать Вайб Места
            </button>
        </div>
    </div>

    <script>
        // ВАЖНО: Замени этот текст на свой настоящий ключ из MapTiler
        const MAPTILER_KEY = 'p3hK1aeFahnKHvtUUKfN';

        const styles = {
            streets: `https://api.maptiler.com/maps/streets-v2/style.json?key=${MAPTILER_KEY}`,
            satellite: `https://api.maptiler.com/maps/satellite/style.json?key=${MAPTILER_KEY}`,
            dark: `https://api.maptiler.com/maps/darkmatter/style.json?key=${MAPTILER_KEY}`
        };

        let map;

        try {
            // ИСПРАВЛЕНО: Убран дефис в названии объекта (maplibregl)
            map = new maplibregl.Map({
                container: 'map',
                style: styles.streets,
                center: [37.6173, 55.7558], 
                zoom: 14,
                pitch: 0,
                bearing: 0,
                antialias: true
            });

            // Включение 3D зданий
            function enable3DBuildings() {
                if (map.getLayer('3d-buildings')) return;
                if (map.getSource('openmaptiles')) {
                    map.addLayer({
                        'id': '3d-buildings',
                        'source': 'openmaptiles',
                        'source-layer': 'building',
                        'type': 'fill-extrusion',
                        'minzoom': 14,
                        'paint': {
                            'fill-extrusion-color': map.getStyle().name.includes('Dark') ? '#2c3e50' : '#f3f4f6',
                            'fill-extrusion-height': ['get', 'render_height'],
                            'fill-extrusion-base': ['get', 'render_min_height'],
                            'fill-extrusion-opacity': 0.85
                        }
                    });
                }
            }

            map.on('style.load', () => {
                if (map.getPitch() > 0) enable3DBuildings();
            });

            // Клик по карте
            map.on('click', (e) => {
                document.getElementById('location-title').innerText = `${e.lngLat.lat.toFixed(4)}, ${e.lngLat.lng.toFixed(4)}`;
                document.getElementById('info-panel').classList.remove('hidden-panel');
            });

        } catch (err) {
            console.error("Ошибка инициализации карты:", err);
            alert("Ошибка загрузки карты. Проверь, правильно ли указан MAPTILER_KEY в коде.");
        }

        // --- УПРАВЛЕНИЕ КНОПКАМИ (Они теперь будут кликаться в любом случае) ---
        const btn2d = document.getElementById('btn-2d');
        const btn3d = document.getElementById('btn-3d');
        const btnSat = document.getElementById('btn-sat');
        const btnTime = document.getElementById('btn-time');

        function setActiveButton(activeBtn) {
            [btn2d, btn3d, btnSat].forEach(b => {
                b.className = "px-3 py-1.5 rounded-full hover:bg-gray-200/70 transition";
            });
            activeBtn.className = "px-3 py-1.5 rounded-full bg-indigo-600 text-white shadow-sm transition";
        }

        btn2d.addEventListener('click', () => {
            setActiveButton(btn2d);
            if(map) {
                map.setStyle(isNight ? styles.dark : styles.streets);
                map.easeTo({ pitch: 0, bearing: 0, duration: 800 });
            }
        });

        btn3d.addEventListener('click', () => {
            setActiveButton(btn3d);
            if(map) {
                map.setStyle(isNight ? styles.dark : styles.streets);
                map.easeTo({ pitch: 55, bearing: -15, duration: 800 });
            }
        });

        btnSat.addEventListener('click', () => {
            setActiveButton(btnSat);
            if(map) {
                map.setStyle(styles.satellite);
                map.easeTo({ pitch: 45, duration: 800 });
            }
        });

        let isNight = false;
        btnTime.addEventListener('click', () => {
            isNight = !isNight;
            if (isNight) {
                btnTime.innerHTML = "<span>☀️</span> День";
                btnTime.className = "px-3 py-1.5 rounded-full bg-amber-500 text-white transition font-semibold";
                if (map && map.getStyle().id !== 'satellite') map.setStyle(styles.dark);
            } else {
                btnTime.innerHTML = "<span>🌙</span> Ночь";
                btnTime.className = "px-3 py-1.5 rounded-full hover:bg-gray-800 hover:text-white transition text-indigo-600 font-semibold";
                if (map && map.getStyle().id !== 'satellite') map.setStyle(styles.streets);
            }
        });

        document.getElementById('close-panel').addEventListener('click', () => {
            document.getElementById('info-panel').classList.add('hidden-panel');
        });
    </script>
</body>
</html>
