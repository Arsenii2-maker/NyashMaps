<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NyashMaps v3.0 — Перезагрузка</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@^4.0.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@^4.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0b0f19; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-hidden { transform: translateX(-100%); }
        .bottom-panel { transition: transform 0.3s ease-out; }
        .bottom-panel-hidden { transform: translateY(120%); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="font-sans text-slate-900 antialiased">

    <!-- Карта -->
    <div id="map"></div>

    <!-- БОКОВАЯ ПАНЕЛЬ (УПРАВЛЕНИЕ И МАРШРУТЫ) -->
    <div class="absolute top-4 left-4 bottom-4 z-20 flex items-start pointer-events-none">
        <div id="sidebar" class="sidebar w-80 bg-white/95 backdrop-blur-md rounded-2xl shadow-2xl p-4 border border-slate-200/60 flex flex-col justify-between h-full pointer-events-auto relative">
            
            <div class="flex flex-col flex-1 overflow-hidden">
                <!-- Логотип -->
                <div class="flex items-center space-x-2 mb-4">
                    <div class="w-7 h-7 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-black text-xs">N</div>
                    <span class="text-sm font-bold tracking-tight text-slate-900">NyashMaps Pro</span>
                </div>

                <!-- Навигация -->
                <div class="bg-slate-50 border border-slate-100 rounded-xl p-3 mb-4">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400">Навигация</span>
                        <button onclick="clearRoute()" class="text-[10px] text-rose-500 font-bold hover:underline">Сбросить всё</button>
                    </div>
                    <div class="space-y-2">
                        <div class="flex items-center bg-white border border-slate-200 rounded-lg px-2.5 py-1.5 space-x-2">
                            <span class="text-xs">🟢</span>
                            <input id="inp-start" type="text" readonly placeholder="Выберите точку 'Отсюда'" class="w-full text-xs focus:outline-none bg-transparent truncate">
                        </div>
                        <div class="flex items-center bg-white border border-slate-200 rounded-lg px-2.5 py-1.5 space-x-2">
                            <span class="text-xs">🔴</span>
                            <input id="inp-end" type="text" readonly placeholder="Выберите точку 'Сюда'" class="w-full text-xs focus:outline-none bg-transparent truncate">
                        </div>
                    </div>

                    <!-- Выбор транспорта -->
                    <div class="grid grid-cols-3 gap-1 mt-3">
                        <button onclick="setTransport('driving', this)" class="mode-btn py-1.5 bg-white border border-slate-200 rounded-lg text-slate-600 hover:bg-slate-50 text-xs transition">🚗 Авто</button>
                        <button onclick="setTransport('foot', this)" class="mode-btn py-1.5 bg-indigo-600 text-white border border-indigo-600 rounded-lg text-xs transition">🏃‍♂️ Пешком</button>
                        <button onclick="setTransport('bike', this)" class="mode-btn py-1.5 bg-white border border-slate-200 rounded-lg text-slate-600 hover:bg-slate-50 text-xs transition">🚴‍♂️ Вело</button>
                    </div>
                </div>

                <!-- Избранное -->
                <div class="flex-1 flex flex-col overflow-hidden">
                    <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-2 block">Сохраненные места ⭐</span>
                    <div id="favorites-list" class="space-y-1.5 overflow-y-auto pr-1 flex-1 custom-scroll">
                        <!-- Сюда падают сохраненки -->
                    </div>
                </div>
            </div>

            <!-- Кнопка Свернуть/Развернуть теперь ЖЕСТКО привязана к правому краю панели -->
            <button id="toggle-sidebar-btn" class="absolute top-4 -right-6 w-6 h-10 bg-white border-y border-r border-slate-200 rounded-r-xl shadow-md flex items-center justify-center text-[10px] text-slate-500 hover:text-slate-900 transition">◀</button>
        </div>
    </div>

    <!-- ФИКСИРОВАННАЯ ИНФО-ПАНЕЛЬ МЕСТА (Выезжает снизу экрана, ничего не прыгает) -->
    <div id="bottom-panel" class="bottom-panel bottom-panel-hidden absolute bottom-4 left-1/2 transform -translate-x-1/2 bg-white/95 backdrop-blur-md border border-slate-200/80 shadow-2xl rounded-2xl p-4 z-30 w-[92%] sm:w-96 flex flex-col space-y-3">
        <div class="flex items-start justify-between">
            <div class="overflow-hidden pr-4">
                <span class="text-[9px] font-bold uppercase tracking-wider text-indigo-600 block mb-0.5">Выбранный объект</span>
                <h3 id="place-address" class="text-xs font-bold text-slate-800 truncate">Загрузка адреса...</h3>
                <p id="place-coords" class="text-[10px] text-slate-400 font-medium mt-0.5">00.0000, 00.0000</p>
            </div>
            <div class="flex items-center space-x-2">
                <button onclick="toggleFavorite()" id="btn-fav" class="w-7 h-7 bg-slate-50 hover:bg-amber-50 rounded-lg border border-slate-200 flex items-center justify-center text-xs transition">☆</button>
                <button onclick="closeBottomPanel()" class="w-7 h-7 bg-slate-50 hover:bg-slate-100 rounded-lg border border-slate-200 flex items-center justify-center text-xs text-slate-400 hover:text-slate-600 font-bold">✕</button>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-2 pt-1">
            <button onclick="setRoutePoint('start')" class="py-2 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold rounded-xl shadow-sm transition active:scale-95">Отсюда</button>
            <button onclick="setRoutePoint('end')" class="py-2 bg-rose-600 hover:bg-rose-700 text-white text-xs font-bold rounded-xl shadow-sm transition active:scale-95">Сюда</button>
        </div>
    </div>

    <!-- КНОПКИ НАСТРОЕК (Справа) -->
    <div class="absolute top-4 right-4 z-20 flex flex-col space-y-2">
        <button onclick="locateMe()" title="Где я?" class="w-9 h-9 bg-white shadow-lg border border-slate-200 rounded-xl flex items-center justify-center text-base hover:bg-slate-50 transition">🎯</button>
        <button id="layers-btn" class="w-9 h-9 bg-white shadow-lg border border-slate-200 rounded-xl flex items-center justify-center text-base hover:bg-slate-50 transition">🗺️</button>
        <div id="layers-dropdown" class="hidden absolute right-0 top-20 bg-white rounded-xl shadow-xl border border-slate-200 p-1.5 flex flex-col space-y-0.5 min-w-[110px]">
            <button onclick="changeStyle('streets')" class="px-2.5 py-1 text-left text-xs font-bold rounded-lg bg-indigo-50 text-indigo-600">Схема</button>
            <button onclick="changeStyle('satellite')" class="px-2.5 py-1 text-left text-xs font-semibold rounded-lg text-slate-600 hover:bg-slate-50">Спутник</button>
            <button onclick="changeStyle('dark')" class="px-2.5 py-1 text-left text-xs font-semibold rounded-lg text-slate-600 hover:bg-slate-50">Ночь</button>
        </div>
    </div>

    <script>
        const MAPTILER_KEY = 'p3hK1aeFahnKHvtUUKfN';

        const styles = {
            streets: `https://api.maptiler.com/maps/streets-v2/style.json?key=${MAPTILER_KEY}`,
            satellite: `https://api.maptiler.com/maps/satellite/style.json?key=${MAPTILER_KEY}`,
            dark: `https://api.maptiler.com/maps/darkmatter/style.json?key=${MAPTILER_KEY}`
        };

        const map = new maplibregl.Map({
            container: 'map',
            style: styles.streets,
            center: [37.6173, 55.7558],
            zoom: 12,
            antialias: true
        });

        let clickedLngLat = null;
        let route = { start: null, end: null };
        let transportMode = 'foot'; // по умолчанию пешком ('driving', 'foot', 'bike')
        let favorites = JSON.parse(localStorage.getItem('nyash_favs_v3')) || [];
        
        // Постоянные маркеры на карте
        let startMarker = null;
        let endMarker = null;
        let userMarker = null;

        // --- КЛИК ПО КАРТЕ ---
        map.on('click', async (e) => {
            clickedLngLat = e.lngLat;
            
            // Показываем панель и пишем координаты сразу
            document.getElementById('place-coords').innerText = `${clickedLngLat.lat.toFixed(5)}, ${clickedLngLat.lng.toFixed(5)}`;
            document.getElementById('place-address').innerText = "Ищем адрес...";
            document.getElementById('bottom-panel').classList.remove('bottom-panel-hidden');

            // Проверяем статус избранного
            updateFavButtonState();

            // Реальное получение адреса (Reverse Geocoding) через бесплатный OpenStreetMap API
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${clickedLngLat.lat}&lon=${clickedLngLat.lng}&accept-language=ru`);
                const data = await response.json();
                document.getElementById('place-address').innerText = data.display_name ? data.display_name.split(',').slice(0, 3).join(',') : "Неизвестное место";
            } catch (err) {
                document.getElementById('place-address').innerText = `Точка: ${clickedLngLat.lat.toFixed(4)}, ${clickedLngLat.lng.toFixed(4)}`;
            }
        });

        function closeBottomPanel() {
            document.getElementById('bottom-panel').classList.add('bottom-panel-hidden');
        }

        // --- УСТАНОВКА ТОЧЕК МАРШРУТА ---
        function setRoutePoint(type) {
            if (!clickedLngLat) return;
            
            route[type] = { lat: clickedLngLat.lat, lng: clickedLngLat.lng };
            const strCoords = `${clickedLngLat.lat.toFixed(4)}, ${clickedLngLat.lng.toFixed(4)}`;
            document.getElementById(`inp-${type}`).value = strCoords;

            // Рендерим физический маркер на карте
            if (type === 'start') {
                if (startMarker) startMarker.remove();
                const el = document.createElement('div'); el.className = 'text-2xl'; el.innerText = '🟢';
                startMarker = new maplibregl.Marker({element: el}).setLngLat([route.start.lng, route.start.lat]).addTo(map);
            } else {
                if (endMarker) endMarker.remove();
                const el = document.createElement('div'); el.className = 'text-2xl'; el.innerText = '🔴';
                endMarker = new maplibregl.Marker({element: el}).setLngLat([route.end.lng, route.end.lat]).addTo(map);
            }

            closeBottomPanel();
            buildRealRoute();
        }

        // --- ПОСТРОЕНИЕ НАСТОЯЩЕГО МАРШРУТА ЧЕРЕЗ OSRM API ---
        async function buildRealRoute() {
            if (!route.start || !route.end) return;

            // Удаляем старую линию маршрута, если она есть
            if (map.getLayer('route-line')) map.removeLayer('route-line');
            if (map.getSource('route-source')) map.removeSource('route-source');

            // Сопоставляем режимы транспорта для OSRM (car -> driving, foot -> walking, bike -> bicycle)
            let osrmProfile = 'foot';
            if (transportMode === 'driving') osrmProfile = 'car';
            if (transportMode === 'bike') osrmProfile = 'bicycle';

            const url = `https://router.project-osrm.org/route/v1/${osrmProfile}/${route.start.lng},${route.start.lat};${route.end.lng},${route.end.lat}?overview=full&geometries=geojson`;

            try {
                const res = await fetch(url);
                const data = await res.json();

                if (!data.routes || data.routes.length === 0) {
                    alert("Не удалось проложить маршрут между этими точками.");
                    return;
                }

                const geometry = data.routes[0].geometry;

                // Рисуем настоящую линию геометрии дорог на карте
                map.addSource('route-source', {
                    'type': 'geojson',
                    'data': {
                        'type': 'Feature',
                        'properties': {},
                        'geometry': geometry
                    }
                });

                map.addLayer({
                    'id': 'route-line',
                    'type': 'line',
                    'source': 'route-source',
                    'layout': { 'line-join': 'round', 'line-cap': 'round' },
                    'paint': {
                        'line-color': '#4f46e5', // Индиго
                        'line-width': 5,
                        'line-opacity': 0.85
                    }
                });

                // Красиво масштабируем карту, чтобы весь путь поместился на экране
                const coordinates = geometry.coordinates;
                const bounds = coordinates.reduce((acc, coord) => acc.extend(coord), new maplibregl.LngLatBounds(coordinates[0], coordinates[0]));
                map.fitBounds(bounds, { padding: 50, duration: 800 });

            } catch (error) {
                console.error("Ошибка роутинга:", error);
                alert("Ошибка соединения с сервером маршрутов.");
            }
        }

        function setTransport(mode, btn) {
            document.querySelectorAll('.mode-btn').forEach(b => {
                b.className = "mode-btn py-1.5 bg-white border border-slate-200 rounded-lg text-slate-600 hover:bg-slate-50 text-xs transition";
            });
            btn.className = "mode-btn py-1.5 bg-indigo-600 text-white border border-indigo-600 rounded-lg text-xs transition";
            transportMode = mode;
            buildRealRoute();
        }

        function clearRoute() {
            route = { start: null, end: null };
            document.getElementById('inp-start').value = '';
            document.getElementById('inp-end').value = '';
            if (startMarker) { startMarker.remove(); startMarker = null; }
            if (endMarker) { endMarker.remove(); endMarker = null; }
            if (map.getLayer('route-line')) map.removeLayer('route-line');
            if (map.getSource('route-source')) map.removeSource('route-source');
            closeBottomPanel();
        }

        // --- ОПРЕДЕЛЕНИЕ ТЕКУЩЕЙ ГЕОПОЗИЦИИ (🎯) ---
        function locateMe() {
            if (!navigator.geolocation) return alert("Геолокация не поддерживается");

            navigator.geolocation.getCurrentPosition((pos) => {
                const { latitude: lat, longitude: lng } = pos.coords;
                map.flyTo({ center: [lng, lat], zoom: 14, duration: 1000 });

                if (userMarker) userMarker.remove();
                const el = document.createElement('div');
                el.className = 'w-4 h-4 bg-blue-500 rounded-full border-2 border-white shadow-xl animate-pulse';
                userMarker = new maplibregl.Marker({element: el}).setLngLat([lng, lat]).addTo(map);

                // Автоподстановка текущей геопозиции в старт маршрута
                route.start = { lat, lng };
                document.getElementById('inp-start').value = `Моя геопозиция`;
                if (startMarker) startMarker.remove();
                startMarker = new maplibregl.Marker().setLngLat([lng, lat]).addTo(map);
                
                buildRealRoute();
            }, () => alert("Доступ к геопозиции отклонен."));
        }

        // --- ИЗБРАННОЕ ---
        function toggleFavorite() {
            if (!clickedLngLat) return;
            const lat = clickedLngLat.lat;
            const lng = clickedLngLat.lng;
            const index = favorites.findIndex(f => f.lat === lat && f.lng === lng);

            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                const customName = prompt("Сохранить место как:", document.getElementById('place-address').innerText);
                if (customName === null) return; 
                favorites.push({ name: customName || "Сохраненная точка", lat, lng });
            }
            localStorage.setItem('nyash_favs_v3', JSON.stringify(favorites));
            updateFavButtonState();
            renderFavorites();
        }

        function updateFavButtonState() {
            if (!clickedLngLat) return;
            const isFav = favorites.some(f => f.lat === clickedLngLat.lat && f.lng === clickedLngLat.lng);
            document.getElementById('btn-fav').innerText = isFav ? '⭐' : '☆';
        }

        function renderFavorites() {
            const container = document.getElementById('favorites-list');
            if (favorites.length === 0) {
                container.innerHTML = `<p class="text-xs text-slate-400 italic text-center py-4">Нет сохраненных мест</p>`;
                return;
            }
            container.innerHTML = favorites.map((f, i) => `
                <div onclick="map.flyTo({center:[${f.lng},${f.lat}], zoom:14})" class="bg-slate-50 hover:bg-indigo-50 border border-slate-100 rounded-lg p-2 transition flex items-center justify-between cursor-pointer group">
                    <span class="text-xs font-semibold text-slate-700 truncate pr-2">${f.name}</span>
                    <button onclick="event.stopPropagation(); favorites.splice(${i},1); localStorage.setItem('nyash_favs_v3', JSON.stringify(favorites)); renderFavorites(); updateFavButtonState();" class="text-slate-300 hover:text-rose-500 text-xs px-1">✕</button>
                </div>
            `).join('');
        }

        // --- УПРАВЛЕНИЕ СИДЕНЬЕМ (SIDEBAR ТУГГЛ) ---
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('toggle-sidebar-btn');
        toggleBtn.addEventListener('click', () => {
            const isHidden = sidebar.classList.toggle('sidebar-hidden');
            toggleBtn.innerText = isHidden ? '▶' : '◀';
            setTimeout(() => map.resize(), 300);
        });

        // Дропдаун слоев
        const layersBtn = document.getElementById('layers-btn');
        const layersDropdown = document.getElementById('layers-dropdown');
        layersBtn.addEventListener('click', (e) => { e.stopPropagation(); layersDropdown.classList.toggle('hidden'); });
        document.addEventListener('click', () => layersDropdown.classList.add('hidden'));

        function changeStyle(styleKey) {
            map.setStyle(styles[styleKey]);
            document.querySelectorAll('#layers-dropdown button').forEach(b => b.className = "px-2.5 py-1 text-left text-xs font-semibold rounded-lg text-slate-600 hover:bg-slate-50");
            event.target.className = "px-2.5 py-1 text-left text-xs font-bold rounded-lg bg-indigo-50 text-indigo-600";
        }

        renderFavorites();
    </script>
</body>
</html>
