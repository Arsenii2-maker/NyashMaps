<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Блокируем зум самого сайта на мобилках -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NyashMaps Next-Gen v4.2</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@^4.0.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@^4.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        /* Запрещаем прокрутку и жесты масштабирования для body */
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #0b0f19;
            touch-action: pan-x pan-y;
        }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        /* Панели интерфейса игнорируют системный мобильный зум и скролл */
        .ui-panel {
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .floating-widget { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .bottom-sheet-hidden { transform: translate(-50%, 150%); opacity: 0; pointer-events: none; }
        .sidebar-card-hidden { transform: translateX(-125%); opacity: 0; pointer-events: none; }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="font-sans text-slate-900 antialiased selection:bg-indigo-500 selection:text-white">

    <!-- КАРТА НА ВЕСЬ ЭКРАН -->
    <div id="map"></div>

    <!-- ТОП-ЦЕНТР: КАТЕГОРИИ ПОИСКА (РАДАР) -->
    <div class="ui-panel absolute top-4 left-1/2 transform -translate-x-1/2 z-20 flex space-x-2 max-w-[85%] overflow-x-auto no-scrollbar py-1">
        <button onclick="fetchLocalPOIs('cafe', '☕')" class="flex items-center space-x-1 px-3 py-1.5 bg-white/95 backdrop-blur-md border border-slate-200/80 shadow-md rounded-full text-xs font-semibold text-slate-700 hover:bg-indigo-50 hover:text-indigo-600 transition active:scale-95 whitespace-nowrap">
            <span>☕</span> <span>Кафе</span>
        </button>
        <button onclick="fetchLocalPOIs('restaurant', '🍕')" class="flex items-center space-x-1 px-3 py-1.5 bg-white/95 backdrop-blur-md border border-slate-200/80 shadow-md rounded-full text-xs font-semibold text-slate-700 hover:bg-indigo-50 hover:text-indigo-600 transition active:scale-95 whitespace-nowrap">
            <span>🍕</span> <span>Еда</span>
        </button>
        <button onclick="fetchLocalPOIs('park', '🌳')" class="flex items-center space-x-1 px-3 py-1.5 bg-white/95 backdrop-blur-md border border-slate-200/80 shadow-md rounded-full text-xs font-semibold text-slate-700 hover:bg-indigo-50 hover:text-indigo-600 transition active:scale-95 whitespace-nowrap">
            <span>🌳</span> <span>Парки</span>
        </button>
        <button onclick="clearPOIMarkers()" id="btn-clear-poi" class="hidden flex items-center space-x-1 px-3 py-1.5 bg-rose-500 text-white shadow-md rounded-full text-xs font-bold hover:bg-rose-600 transition active:scale-95 whitespace-nowrap">
            <span>✕</span> <span>Сбросить поиск</span>
        </button>
    </div>

    <!-- СЛЕВА: БОКОВАЯ ПАНЕЛЬ -->
    <div class="ui-panel absolute top-4 left-4 z-20 flex items-start space-x-2">
        <button id="btn-restore-sidebar" class="hidden w-10 h-10 bg-white/95 backdrop-blur-md border border-slate-200 shadow-xl rounded-xl flex items-center justify-center text-slate-600 hover:text-slate-900 transition active:scale-95">🗺️</button>

        <div id="sidebar-card" class="floating-widget w-80 bg-white/95 backdrop-blur-lg rounded-2xl shadow-xl border border-slate-200/80 p-4 flex flex-col max-h-[calc(100vh-40px)]">
            <div class="flex items-center justify-between mb-3.5">
                <div class="flex items-center space-x-2">
                    <div class="w-6 h-6 bg-gradient-to-tr from-indigo-600 to-violet-500 rounded-lg flex items-center justify-center text-white font-black text-[10px]">N</div>
                    <span class="text-xs font-bold tracking-tight text-slate-800">NyashMaps Pro</span>
                </div>
                <div class="flex items-center space-x-2">
                    <button onclick="clearAllRouteData()" class="text-[10px] text-slate-400 font-bold hover:text-rose-500 transition">Сбросить</button>
                    <button id="btn-close-sidebar" class="text-slate-400 hover:text-slate-700 p-1 text-xs font-bold">◀</button>
                </div>
            </div>

            <!-- Поля маршрута -->
            <div class="space-y-1.5 bg-slate-50 border border-slate-100 p-2.5 rounded-xl mb-3">
                <div class="flex items-center bg-white border border-slate-200 rounded-lg px-2 py-1 space-x-2 shadow-sm">
                    <span class="text-xs">🟢</span>
                    <input id="inp-start" type="text" readonly placeholder="Откуда (клик на карту)" class="w-full text-xs bg-transparent focus:outline-none text-slate-700 truncate cursor-default">
                </div>
                <div class="flex items-center bg-white border border-slate-200 rounded-lg px-2 py-1 space-x-2 shadow-sm">
                    <span class="text-xs">🔴</span>
                    <input id="inp-end" type="text" readonly placeholder="Сюда (клик на карту)" class="w-full text-xs bg-transparent focus:outline-none text-slate-700 truncate cursor-default">
                </div>
                
                <div class="grid grid-cols-3 gap-1 pt-1.5">
                    <button onclick="changeTransportMode('driving', this)" class="mode-btn py-1 bg-white border border-slate-200 rounded-md text-slate-600 text-[11px] font-medium transition hover:bg-slate-50">🚗 Авто</button>
                    <button onclick="changeTransportMode('foot', this)" class="mode-btn py-1 bg-indigo-600 text-white border border-indigo-600 rounded-md text-[11px] font-medium transition">🏃‍♂️ Пешком</button>
                    <button onclick="changeTransportMode('bike', this)" class="mode-btn py-1 bg-white border border-slate-200 rounded-md text-slate-600 text-[11px] font-medium transition hover:bg-slate-50">🚴‍♂️ Вело</button>
                </div>
            </div>

            <!-- Избранное -->
            <div class="flex-1 flex flex-col overflow-hidden">
                <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1.5 block">Избранное ⭐</span>
                <div id="favorites-box" class="space-y-1 overflow-y-auto pr-0.5 flex-1 custom-scroll text-xs"></div>
            </div>
        </div>
    </div>

    <!-- СВЕРХУ СПРАВА: ПАНЕЛЬ МАРШРУТА -->
    <div id="route-meta-card" class="ui-panel hidden absolute top-4 right-16 z-20 bg-indigo-600 text-white px-4 py-2 rounded-xl shadow-xl border border-indigo-500/30 flex items-center space-x-3">
        <div class="flex flex-col">
            <span class="text-[8px] font-bold uppercase tracking-wider text-indigo-200">Маршрут построен</span>
            <div class="flex items-baseline space-x-1">
                <span id="meta-duration" class="text-sm font-black">-- мин</span>
                <span id="meta-distance" class="text-[11px] font-medium text-indigo-100">(-- км)</span>
            </div>
        </div>
        <button onclick="clearAllRouteData()" class="bg-indigo-700 hover:bg-indigo-800 text-white rounded-lg p-1 text-xs transition">✕</button>
    </div>

    <!-- СПРАВА: КНОПКИ КАМЕРЫ И СЛОЕВ -->
    <div class="ui-panel absolute top-4 right-4 z-20 flex flex-col space-y-2">
        <button onclick="locateUserDevice(true)" title="Где я?" class="w-9 h-9 bg-white shadow-lg border border-slate-200 rounded-xl flex items-center justify-center text-base hover:bg-slate-50 transition active:scale-95">🎯</button>
        
        <!-- Кастомные кнопки управления зумом -->
        <div class="flex flex-col bg-white shadow-lg border border-slate-200 rounded-xl overflow-hidden">
            <button onclick="smoothZoom(true)" title="Приблизить" class="w-9 h-9 font-bold text-lg text-slate-600 hover:bg-slate-50 border-b border-slate-100 transition active:bg-slate-100">+</button>
            <button onclick="smoothZoom(false)" title="Отдалить" class="w-9 h-9 font-bold text-lg text-slate-600 hover:bg-slate-50 transition active:bg-slate-100">−</button>
        </div>

        <!-- Переключатели стилей и пробок -->
        <div class="flex flex-col space-y-1 relative">
            <button id="btn-layers" class="w-9 h-9 bg-white shadow-lg border border-slate-200 rounded-xl flex items-center justify-center text-base hover:bg-slate-50 transition">🗺️</button>
            <button onclick="toggleTrafficLayer(this)" id="btn-traffic" title="Показать пробки" class="w-9 h-9 bg-white shadow-lg border border-slate-200 rounded-xl flex items-center justify-center text-base hover:bg-slate-50 transition">🚦</button>
            
            <div id="dropdown-layers" class="hidden absolute right-0 top-11 bg-white rounded-xl shadow-xl border border-slate-200 p-1 flex flex-col space-y-0.5 min-w-[100px]">
                <button onclick="setMapStyle('streets')" class="px-2 py-1 text-left text-xs font-bold rounded-lg bg-indigo-50 text-indigo-600">Схема</button>
                <button onclick="setMapStyle('satellite')" class="px-2 py-1 text-left text-xs font-semibold rounded-lg text-slate-600 hover:bg-slate-50">Спутник</button>
                <button onclick="setMapStyle('dark')" class="px-2 py-1 text-left text-xs font-semibold rounded-lg text-slate-600 hover:bg-slate-50">Ночь</button>
            </div>
        </div>
    </div>

    <!-- СНИЗУ: ИНФО-ПАНЕЛЬ ОБЪЕКТА -->
    <div id="bottom-sheet" class="ui-panel floating-widget bottom-sheet-hidden fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-white/95 backdrop-blur-md border border-slate-200/80 shadow-2xl rounded-2xl p-4 z-30 w-[90%] sm:w-[420px] flex flex-col space-y-3">
        <div class="flex items-start justify-between">
            <div class="overflow-hidden pr-4 flex-1">
                <span id="sheet-badge" class="text-[9px] font-bold uppercase tracking-wider text-indigo-600 block mb-0.5">Выбранная локация</span>
                <h3 id="sheet-title" class="text-xs font-bold text-slate-800 truncate">Поиск адреса...</h3>
                <p id="sheet-subtitle" class="text-[10px] text-slate-400 font-mono mt-0.5">00.0000, 00.0000</p>
            </div>
            <div class="flex items-center space-x-1.5 flex-shrink-0">
                <button onclick="handleFavoriteToggle()" id="sheet-fav-btn" class="w-7 h-7 bg-slate-50 hover:bg-amber-50 border border-slate-200 rounded-lg flex items-center justify-center text-xs transition">☆</button>
                <button onclick="closeBottomSheet()" class="w-7 h-7 bg-slate-50 hover:bg-rose-50 border border-slate-200 rounded-lg flex items-center justify-center text-xs text-slate-400 hover:text-rose-500 font-bold transition">✕</button>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-2">
            <button onclick="assignRouteEndpoint('start')" class="py-2 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold rounded-xl shadow-md transition active:scale-95">Отсюда</button>
            <button onclick="assignRouteEndpoint('end')" class="py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-xl shadow-md transition active:scale-95">Сюда</button>
        </div>
    </div>

    <script>
        // ВСТАВЬ СВОЙ КЛЮЧ СЮДА
        const MAPTILER_KEY = 'p3hK1aeFahnKHvtUUKfN';

        const mapStyles = {
            streets: `https://api.maptiler.com/maps/streets-v2/style.json?key=${MAPTILER_KEY}`,
            satellite: `https://api.maptiler.com/maps/satellite/style.json?key=${MAPTILER_KEY}`,
            dark: `https://api.maptiler.com/maps/darkmatter/style.json?key=${MAPTILER_KEY}`,
            traffic: `https://api.maptiler.com/maps/traffic-day/style.json?key=${MAPTILER_KEY}`
        };

        // Инициализация карты с повышенной плавностью
        const map = new maplibregl.Map({
            container: 'map',
            style: mapStyles.streets,
            center: [37.6173, 55.7558], 
            zoom: 12,
            zoomSnap: 0.1,
            wheelZoomRate: 1/120, 
            antialias: true
        });

        map.addControl(new maplibregl.ScaleControl({maxWidth: 80, unit: 'metric'}), 'bottom-left');

        let activeLngLat = null;
        let pointsData = { start: null, end: null, startName: '', endName: '' };
        let activeTransport = 'foot';
        let savedPlaces = JSON.parse(localStorage.getItem('nyash_premium_favs_v4')) || [];
        
        let startMarker = null;
        let endMarker = null;
        let userDeviceMarker = null;
        let poiMarkers = [];
        let isTrafficActive = false;
        let currentBaseStyle = 'streets';

        // ЖЕСТКИЙ ЗАПРЕТ НА DOUBLE-TAP ЗУМ ВСЕГО ИНТЕРФЕЙСА САЙТА
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) {
                e.preventDefault(); // Блокирует pinch-to-zoom самого HTML документа
            }
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault(); // Запрещает двойной тап по кнопкам интерфейса
            }
            lastTouchEnd = now;
        }, { passive: false });

        // Авто-определение позиции при старте
        map.on('load', () => {
            locateUserDevice(false);
        });

        // Кнопки плавного зума (без рывков)
        function smoothZoom(zoomIn) {
            const currentZoom = map.getZoom();
            map.flyTo({
                zoom: zoomIn ? currentZoom + 1 : currentZoom - 1,
                duration: 300,
                essential: true
            });
        }

        // КЛИК ПО КАРТЕ
        map.on('click', async (e) => {
            if (e.originalEvent.target.closest('.maplibregl-marker') || e.originalEvent.target.closest('.ui-panel')) return;
            activeLngLat = e.lngLat;
            
            document.getElementById('sheet-badge').innerText = "Выбранная точка";
            document.getElementById('sheet-title').innerText = "Определяем адрес...";
            document.getElementById('sheet-subtitle').innerText = `${activeLngLat.lat.toFixed(5)}, ${activeLngLat.lng.toFixed(5)}`;
            
            refreshFavButtonIcon();
            document.getElementById('bottom-sheet').classList.remove('bottom-sheet-hidden');

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${activeLngLat.lat}&lon=${activeLngLat.lng}&accept-language=ru`);
                const data = await response.json();
                const addressStr = data.display_name ? data.display_name.split(',').slice(0, 3).join(',') : "Неизвестное место";
                document.getElementById('sheet-title').innerText = addressStr;
            } catch (err) {
                document.getElementById('sheet-title').innerText = `Координаты: ${activeLngLat.lat.toFixed(4)}, ${activeLngLat.lng.toFixed(4)}`;
            }
        });

        function closeBottomSheet() {
            document.getElementById('bottom-sheet').classList.add('bottom-sheet-hidden');
            activeLngLat = null;
        }

        // РАБОТА С МАРШРУТАМИ
        function assignRouteEndpoint(role) {
            if (!activeLngLat) return;
            const lat = activeLngLat.lat; const lng = activeLngLat.lng;
            const name = document.getElementById('sheet-title').innerText;

            pointsData[role] = { lat, lng };
            pointsData[role + 'Name'] = name;
            document.getElementById(`inp-${role}`).value = name;

            if (role === 'start') {
                if (startMarker) startMarker.remove();
                const el = document.createElement('div'); el.className = 'text-2xl drop-shadow-md'; el.innerText = '🟢';
                startMarker = new maplibregl.Marker({element: el}).setLngLat([lng, lat]).addTo(map);
            } else {
                if (endMarker) endMarker.remove();
                const el = document.createElement('div'); el.className = 'text-2xl drop-shadow-md'; el.innerText = '🔴';
                endMarker = new maplibregl.Marker({element: el}).setLngLat([lng, lat]).addTo(map);
            }

            closeBottomSheet();
            requestRouteOSRM();
        }

        async function requestRouteOSRM() {
            if (!pointsData.start || !pointsData.end) return;

            if (map.getLayer('route-line')) map.removeLayer('route-line');
            if (map.getSource('route-source')) map.removeSource('route-source');

            let profile = activeTransport === 'driving' ? 'car' : (activeTransport === 'bike' ? 'bicycle' : 'foot');
            const url = `https://router.project-osrm.org/route/v1/${profile}/${pointsData.start.lng},${pointsData.start.lat};${pointsData.end.lng},${pointsData.end.lat}?overview=full&geometries=geojson`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                if (!data.routes || data.routes.length === 0) return;

                const routeGeometry = data.routes[0].geometry;
                map.addSource('route-source', { 'type': 'geojson', 'data': { 'type': 'Feature', 'geometry': routeGeometry } });
                map.addLayer({
                    'id': 'route-line', 'type': 'line', 'source': 'route-source',
                    'layout': { 'line-join': 'round', 'line-cap': 'round' },
                    'paint': { 'line-color': '#4f46e5', 'line-width': 5, 'line-opacity': 0.85 }
                });

                const km = (data.routes[0].distance / 1000).toFixed(1);
                const mins = Math.round(data.routes[0].duration / 60);
                document.getElementById('meta-duration').innerText = mins > 60 ? `${Math.floor(mins/60)} ч ${mins%60} мин` : `${mins} мин`;
                document.getElementById('meta-distance').innerText = `(${km} км)`;
                document.getElementById('route-meta-card').classList.remove('hidden');

                // Автоматически убираем панель
                document.getElementById('sidebar-card').classList.add('sidebar-card-hidden');
                document.getElementById('btn-restore-sidebar').classList.remove('hidden');

                const coords = routeGeometry.coordinates;
                const bounds = coords.reduce((acc, c) => acc.extend(c), new maplibregl.LngLatBounds(coords[0], coords[0]));
                map.fitBounds(bounds, { padding: 80, duration: 800 });
            } catch (err) { console.error(err); }
        }

        function changeTransportMode(mode, btn) {
            document.querySelectorAll('.mode-btn').forEach(b => b.className = "mode-btn py-1 bg-white border border-slate-200 rounded-md text-slate-600 text-[11px] font-medium transition");
            btn.className = "mode-btn py-1 bg-indigo-600 text-white border border-indigo-600 rounded-md text-[11px] font-medium transition";
            activeTransport = mode;
            requestRouteOSRM();
        }

        function clearAllRouteData() {
            pointsData = { start: null, end: null, startName: '', endName: '' };
            document.getElementById('inp-start').value = ''; document.getElementById('inp-end').value = '';
            if (startMarker) { startMarker.remove(); startMarker = null; }
            if (endMarker) { endMarker.remove(); endMarker = null; }
            if (map.getLayer('route-line')) map.removeLayer('route-line');
            if (map.getSource('route-source')) map.removeSource('route-source');
            document.getElementById('route-meta-card').classList.add('hidden');
            document.getElementById('sidebar-card').classList.remove('sidebar-card-hidden');
            document.getElementById('btn-restore-sidebar').classList.add('hidden');
            closeBottomSheet();
        }

        // ИСПРАВЛЕННЫЙ И РАБОЧИЙ РАДАР (ПОИСК КАТЕГОРИЙ)
        async function fetchLocalPOIs(amenityType, emoji) {
            clearPOIMarkers();
            const center = map.getCenter();
            const delta = 0.02; 
            const bbox = `${center.lat - delta},${center.lng - delta},${center.lat + delta},${center.lng + delta}`;

            const clearBtn = document.getElementById('btn-clear-poi');
            clearBtn.innerHTML = `<span>🔄</span> <span>Ищем...</span>`;
            clearBtn.classList.remove('hidden');

            const query = `[out:json][timeout:25];node["amenity"="${amenityType}"](${bbox});out 30;`;
            const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                clearBtn.innerHTML = `<span>✕</span> <span>Сбросить поиск</span>`;

                if (!data.elements || data.elements.length === 0) {
                    alert("Рядом ничего не найдено. Попробуй сместить карту.");
                    clearBtn.classList.add('hidden');
                    return;
                }

                data.elements.forEach(item => {
                    const name = item.tags.name || `Заведение (${emoji})`;
                    const el = document.createElement('div');
                    el.className = 'flex items-center justify-center bg-white border-2 border-indigo-600 shadow-xl rounded-full w-8 h-8 text-base cursor-pointer hover:scale-110 transition duration-150 ui-panel';
                    el.innerText = emoji;

                    const marker = new maplibregl.Marker({element: el}).setLngLat([item.lon, item.lat]).addTo(map);

                    el.addEventListener('click', (event) => {
                        event.stopPropagation();
                        activeLngLat = new maplibregl.LngLat(item.lon, item.lat);
                        document.getElementById('sheet-badge').innerText = "Найденный объект";
                        document.getElementById('sheet-title').innerText = name;
                        document.getElementById('sheet-subtitle').innerText = `${item.lat.toFixed(5)}, ${item.lon.toFixed(5)}`;
                        refreshFavButtonIcon();
                        document.getElementById('bottom-sheet').classList.remove('bottom-sheet-hidden');
                        map.easeTo({ center: [item.lon, item.lat], zoom: 15, duration: 400 });
                    });
                    poiMarkers.push(marker);
                });
            } catch (err) {
                console.error(err);
                clearBtn.innerHTML = `<span>✕</span> <span>Сбросить поиск</span>`;
            }
        }

        function clearPOIMarkers() {
            poiMarkers.forEach(m => m.remove());
            poiMarkers = [];
            document.getElementById('btn-clear-poi').classList.add('hidden');
        }

        // ИСПРАВЛЕННАЯ КНОПКА ПРОБОК (ЧЕСТНАЯ СМЕНА СТИЛЯ НА TRAFFIC)
        function toggleTrafficLayer(btn) {
            isTrafficActive = !isTrafficActive;
            if (isTrafficActive) {
                btn.classList.add('bg-rose-500', 'text-white');
                map.setStyle(mapStyles.traffic);
            } else {
                btn.classList.remove('bg-rose-500', 'text-white');
                map.setStyle(mapStyles[currentBaseStyle]);
            }
        }

        function setMapStyle(styleKey) {
            currentBaseStyle = styleKey;
            if (!isTrafficActive) {
                map.setStyle(mapStyles[styleKey]);
            }
        }

        // ОПРЕДЕЛЕНИЕ ГЕОПОЗИЦИИ ПОЛЬЗОВАТЕЛЯ
        function locateUserDevice(flyToUser = false) {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition((pos) => {
                const { latitude: lat, longitude: lng } = pos.coords;
                map.flyTo({ center: [lng, lat], zoom: 14, duration: flyToUser ? 1000 : 0 });

                if (userDeviceMarker) userDeviceMarker.remove();
                const el = document.createElement('div');
                el.className = 'w-4 h-4 bg-indigo-600 rounded-full border-2 border-white shadow-2xl relative animate-pulse';
                userDeviceMarker = new maplibregl.Marker({element: el}).setLngLat([lng, lat]).addTo(map);
            }, () => {
                if (flyToUser) alert("Включи геолокацию в настройках браузера.");
            });
        }

        // ИЗБРАННОЕ
        function handleFavoriteToggle() {
            if (!activeLngLat) return;
            const lat = activeLngLat.lat; const lng = activeLngLat.lng;
            const index = savedPlaces.findIndex(f => f.lat === lat && f.lng === lng);
            if (index > -1) { savedPlaces.splice(index, 1); } 
            else { savedPlaces.push({ name: document.getElementById('sheet-title').innerText, lat, lng }); }
            localStorage.setItem('nyash_premium_favs_v4', JSON.stringify(savedPlaces));
            refreshFavButtonIcon(); renderFavoritesList();
        }

        function refreshFavButtonIcon() {
            if (!activeLngLat) return;
            document.getElementById('sheet-fav-btn').innerText = savedPlaces.some(f => f.lat === activeLngLat.lat && f.lng === activeLngLat.lng) ? '⭐' : '☆';
        }

        function renderFavoritesList() {
            const container = document.getElementById('favorites-box');
            if (savedPlaces.length === 0) { container.innerHTML = `<p class="text-[11px] text-slate-400 italic text-center py-2">Список пуст</p>`; return; }
            container.innerHTML = savedPlaces.map((f, i) => `
                <div onclick="map.flyTo({center:[${f.lng},${f.lat}], zoom:14})" class="bg-slate-50 hover:bg-indigo-50/60 border border-slate-100 rounded-lg p-2 transition flex items-center justify-between cursor-pointer mb-1">
                    <span class="font-medium text-slate-700 truncate pr-2 max-w-[85%]">${f.name}</span>
                    <button onclick="event.stopPropagation(); savedPlaces.splice(${i},1); localStorage.setItem('nyash_premium_favs_v4', JSON.stringify(savedPlaces)); renderFavoritesList(); refreshFavButtonIcon();" class="text-slate-300 hover:text-rose-500 font-bold px-1">✕</button>
                </div>
            `).join('');
        }

        // ИНТЕРФЕЙСНЫЕ СЛУШАТЕЛИ
        document.getElementById('btn-close-sidebar').addEventListener('click', () => {
            document.getElementById('sidebar-card').classList.add('sidebar-card-hidden');
            document.getElementById('btn-restore-sidebar').classList.remove('hidden');
        });
        document.getElementById('btn-restore-sidebar').addEventListener('click', () => {
            document.getElementById('sidebar-card').classList.remove('sidebar-card-hidden');
            document.getElementById('btn-restore-sidebar').classList.add('hidden');
        });
        const btnLayers = document.getElementById('btn-layers');
        const dropdownLayers = document.getElementById('dropdown-layers');
        btnLayers.addEventListener('click', (e) => { e.stopPropagation(); dropdownLayers.classList.toggle('hidden'); });
        document.addEventListener('click', () => dropdownLayers.classList.add('hidden'));

        renderFavoritesList();
    </script>
</body>
</html>
